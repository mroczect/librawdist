name: Library Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-
            ${{ runner.os }}-cargo-
      - name: Run all tests
        run: cargo test --verbose -- --test-threads=1

  release:
    name: Create GitHub Release (library)
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create source archive
        run: |
          # exclude .git and target directories
          tar --exclude='.git' --exclude='target' -czf librawdist-src.tar.gz .

      - name: Generate SHA256 checksum
        run: sha256sum librawdist-src.tar.gz > librawdist-src.tar.gz.sha256

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          artifacts: "librawdist-src.tar.gz,librawdist-src.tar.gz.sha256"
          body: |
            ## librawdist Library Release ${{ github.ref_name }}

            This is the source code release of the **librawdist** Rust library.

            ### Download
            - [Source code (tar.gz)](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/librawdist-src.tar.gz)
            - [SHA256 checksum](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/librawdist-src.tar.gz.sha256)

            ### Integration
            Add to your `Cargo.toml`:
            ```toml
            [dependencies]
            librawdist = { git = "https://github.com/${{ github.repository }}", tag = "${{ github.ref_name }}" }
            ```
