[package]
name = "librawdist"
version = "0.1.0"
edition = "2024"

[dependencies]
clap = { version = "4.6", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
toml = "1.1"
thiserror = "2"
miette = { version = "7", features = ["fancy"] }
tar = "0.4"
flate2 = "1.1"
sha2 = "0.11"
hex = "0.4"
walkdir = "2.5"
chrono = { version = "0.4", features = ["serde"] }
tempfile = "3"
log = "0.4"
env_logger = "0.11"
semver = "1.0"
fs2 = "0.4"
glob = "0.3.3"


[lib]
path = "src/lib.rs"
